<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luyện nghe - Learn with Ms.Thúy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="index.html" class="back-btn">← Quay lại</a>
      <div class="logo">
        <div class="logo-icon">🎧</div>
        <div class="logo-text">
          Learn with Ms.Thúy
          <small id="lessonTitle">Loading...</small>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="listening-container">
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div>Đang tải bài nghe...</div>
  </div>

  <div id="lessonContent" style="display:none;">
    <div class="lesson-header">
      <div class="lesson-title">
        <span id="lessonEmoji">🎧</span>
        <span id="lessonTitleMain">Lesson Title</span>
      </div>
      <div class="lesson-progress">
        <span id="progressText">Câu 1/5</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressPercent">0%</span>
      </div>
    </div>

    <div class="audio-player">
      <div class="player-main">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="player-info">
          <div class="waveform-container" id="waveformContainer">
            <div class="time-tooltip" id="timeTooltip">0:00</div>
            <div class="waveform" id="waveform"></div>
          </div>
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>
      <div class="player-controls">
        <div class="control-group">
          <button class="ctrl-btn" onclick="seekAudio(-5)">⏪ -5s</button>
          <button class="ctrl-btn" onclick="seekAudio(5)">+5s ⏩</button>
          <button class="ctrl-btn" onclick="replayAudio()">🔁 Replay</button>
        </div>
        <div class="control-group">
          <button class="ctrl-btn speed-btn" data-speed="0.5">0.5x</button>
          <button class="ctrl-btn speed-btn" data-speed="0.75">0.75x</button>
          <button class="ctrl-btn speed-btn active" data-speed="1">1x</button>
          <button class="ctrl-btn speed-btn" data-speed="1.25">1.25x</button>
          <button class="ctrl-btn speed-btn" data-speed="1.5">1.5x</button>
        </div>
      </div>
      <audio id="audioEl" preload="metadata"></audio>
    </div>

    <div class="sentence-card" id="sentenceCard">
      <div class="sentence-header">
        <div class="sentence-number">
          <span>📝</span>
          <span>Câu <span id="currentSentenceNum">1</span>/<span id="totalSentences">5</span></span>
        </div>
        <div class="sentence-translation" id="sentenceTranslation"></div>
      </div>

      <!-- KHUNG GÕ CHỮ TỪNG TỪ (Thay thế textarea cũ) -->
      <div class="hint-section" id="wordInputSection">
        <div class="hint-header">
          <span class="hint-title">⌨️ Gõ từng từ (Nhấn Space để qua từ tiếp)</span>
          <span class="hint-counter" id="hintCounter">💡 0/3</span>
        </div>
        <div class="hint-words-container" id="wordInputsContainer">
          <!-- Các ô input sẽ được render động tại đây -->
        </div>
      </div>

      <div class="sentence-result" id="sentenceResult"></div>

      <div class="action-row">
        <button class="btn btn-ghost" onclick="clearAllInputs()">🗑️ Xóa hết</button>
        <button class="btn btn-primary" id="checkBtn" onclick="checkCurrentSentence()">✅ Kiểm tra</button>
        <button class="btn btn-success" id="nextBtn" onclick="nextSentence()" style="display:none;">
          Câu tiếp theo →
        </button>
      </div>
    </div>

    <div id="finalResult" style="display:none;"></div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
<script src="script.js"></script>
<script>
const state = {
  lesson: null,
  currentSentenceIndex: 0,
  results: [],
  hintsUsedThisSentence: 0,
  isPlaying: false,
  audioEl: null
};

async function initLesson() {
  const params = new URLSearchParams(window.location.search);
  const dataFile = params.get('data');
  if (!dataFile) { toast('Thiếu thông tin bài học', 'error'); return; }

  try {
    const res = await fetch(dataFile + '?t=' + Date.now());
    if (!res.ok) throw new Error('Không thể tải ' + dataFile);
    const lesson = await res.json();

    state.lesson = lesson;
    state.audioEl = document.getElementById('audioEl');

    document.title = `${lesson.title} - Learn with Ms.Thúy`;
    document.getElementById('lessonTitle').textContent = lesson.title;
    document.getElementById('lessonTitleMain').textContent = lesson.title;
    document.getElementById('totalSentences').textContent = lesson.sentences.length;

    state.audioEl.src = lesson.audio;
    generateWaveform();
    loadCurrentSentence();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('lessonContent').style.display = 'block';

    setupAudioEvents();
    setupSpeedButtons();
    setupInteractiveWaveform();

  } catch (e) {
    console.error(e);
    document.getElementById('loadingState').innerHTML = `
      <div class="empty-state-icon">⚠️</div>
      <h3>Lỗi tải bài học</h3>
      <p style="margin-bottom: 16px;">${escapeHtml(e.message)}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top: 16px;">← Về trang chủ</a>
    `;
  }
}

// =========================================================
// RENDER Ô GÕ CHỮ TỪNG TỪ
// =========================================================
function loadCurrentSentence() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  if (!sentence) return;

  state.hintsUsedThisSentence = 0;
  document.getElementById('currentSentenceNum').textContent = state.currentSentenceIndex + 1;
  document.getElementById('sentenceTranslation').textContent = '💭 ' + (sentence.translation || '');
  document.getElementById('sentenceResult').classList.remove('show', 'correct', 'incorrect');
  document.getElementById('checkBtn').style.display = 'inline-flex';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';

  renderWordInputs();
  updateProgress();       // <-- ĐÃ BỔ SUNG LẠI
  updateHintCounter();
}

// HÀM CẬP NHẬT THANH TIẾN TRÌNH (Đã thêm lại)
function updateProgress() {
  const total = state.lesson.sentences.length;
  const current = state.currentSentenceIndex;
  const percent = Math.round((current / total) * 100);

  document.getElementById('progressText').textContent = `Câu ${current + 1}/${total}`;
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressFill').style.width = percent + '%';
}

function updateHintCounter() {
  document.getElementById('hintCounter').textContent = `💡 ${state.hintsUsedThisSentence}/3`;
}

function renderWordInputs() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  const words = sentence.text.split(/\s+/);
  const container = document.getElementById('wordInputsContainer');
  container.innerHTML = '';

  words.forEach((word, index) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'word-input-wrapper';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'word-input';
    input.dataset.index = index;
    input.dataset.correct = word;
    input.placeholder = '_'.repeat(word.length);
    input.autocomplete = "off";
    input.spellcheck = false;
    
    input.addEventListener('keydown', (e) => handleWordKeydown(e, index, words.length));

    const btn = document.createElement('button');
    btn.className = 'hint-word-btn';
    btn.id = `hint-btn-${index}`;
    btn.innerHTML = '👁️';
    btn.title = 'Gợi ý từ này';
    btn.onclick = () => revealWord(index, word, input, btn);

    wrapper.appendChild(input);
    wrapper.appendChild(btn);
    container.appendChild(wrapper);
  });

  setTimeout(() => {
    const firstInput = container.querySelector('.word-input');
    if (firstInput) firstInput.focus();
  }, 100);
}

function handleWordKeydown(e, currentIndex, totalWords) {
  const inputs = document.querySelectorAll('.word-input');
  
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    if (currentIndex < totalWords - 1) {
      inputs[currentIndex + 1].focus();
    }
  }
  else if (e.key === 'Backspace' && e.target.value === '') {
    e.preventDefault();
    if (currentIndex > 0) {
      inputs[currentIndex - 1].focus();
    }
  }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (currentIndex < totalWords - 1) {
      inputs[currentIndex + 1].focus();
    } else {
      checkCurrentSentence();
    }
  }
  else if (e.key === 'Tab') {
    e.preventDefault();
    const nextIndex = e.shiftKey ? currentIndex - 1 : currentIndex + 1;
    if (nextIndex >= 0 && nextIndex < totalWords) {
      inputs[nextIndex].focus();
    }
  }
}

// =========================================================
// LOGIC HINT (CON MẮT)
// =========================================================
function revealWord(index, correctWord, inputEl, btnEl) {
  if (inputEl.disabled) return;
  
  if (state.hintsUsedThisSentence >= 3) {
    toast('🚫 Bạn đã dùng hết 3 lượt Hint cho câu này.', 'warning');
    return;
  }

  inputEl.value = correctWord;
  inputEl.classList.add('revealed-by-hint');
  inputEl.disabled = true;

  btnEl.innerHTML = '✓';
  btnEl.classList.add('revealed');
  btnEl.disabled = true;

  state.hintsUsedThisSentence++;
  updateHintCounter();

  if (state.hintsUsedThisSentence >= 3) {
    disableAllHintButtons();
  }

  toast(`💡 Đã mở từ "${correctWord}"`, 'info');
  
  const inputs = document.querySelectorAll('.word-input');
  if (index < inputs.length - 1) {
    inputs[index + 1].focus();
  }
}

function disableAllHintButtons() {
  const buttons = document.querySelectorAll('.hint-word-btn');
  buttons.forEach(btn => {
    if (!btn.disabled) {
      btn.innerHTML = '🔒';
      btn.classList.add('locked');
      btn.disabled = true;
    }
  });
}

function clearAllInputs() {
  const inputs = document.querySelectorAll('.word-input:not(.revealed-by-hint)');
  inputs.forEach(input => { input.value = ''; });
  const firstInput = document.querySelector('.word-input');
  if (firstInput) firstInput.focus();
}

// =========================================================
// KIỂM TRA KẾT QUẢ (Ngưỡng 80%)
// =========================================================
function checkCurrentSentence() {
  const inputs = document.querySelectorAll('.word-input');
  let correctCount = 0;
  let html = '';
  let userAnswers = [];

  inputs.forEach((input) => {
    const userVal = normalizeWord(input.value);
    const correctVal = normalizeWord(input.dataset.correct);
    userAnswers.push(input.value);

    if (userVal === correctVal) {
      correctCount++;
      html += `<span class="word-correct">${escapeHtml(input.dataset.correct)}</span> `;
      input.classList.add('input-correct');
    } else {
      html += `<span class="word-wrong">${escapeHtml(input.value || '...')}</span> `;
      input.classList.add('input-wrong');
    }
    input.disabled = true;
  });

  const totalWords = inputs.length;
  const accuracy = totalWords > 0 ? (correctCount / totalWords) * 100 : 0;
  const isCorrect = accuracy >= 80;

  state.results.push({
    sentenceId: state.lesson.sentences[state.currentSentenceIndex].id,
    userAnswer: userAnswers.join(' '),
    correctAnswer: state.lesson.sentences[state.currentSentenceIndex].text,
    isCorrect: isCorrect,
    hintsUsed: state.hintsUsedThisSentence,
    accuracy: accuracy
  });

  const resultEl = document.getElementById('sentenceResult');
  resultEl.className = 'sentence-result show ' + (isCorrect ? 'correct' : 'incorrect');
  
  if (!isCorrect) {
    html += `<div class="correct-answer">✅ Đáp án đúng: <strong>${escapeHtml(state.lesson.sentences[state.currentSentenceIndex].text)}</strong><br><small>(Độ chính xác: ${accuracy.toFixed(0)}% - Cần ≥ 80%)</small></div>`;
  } else if (accuracy < 100) {
    html += `<div class="correct-answer" style="color: var(--warning);">⚠️ Chấp nhận (${accuracy.toFixed(0)}%). Đáp án gốc: <strong>${escapeHtml(state.lesson.sentences[state.currentSentenceIndex].text)}</strong></div>`;
  }
  
  resultEl.innerHTML = html;

  document.getElementById('checkBtn').disabled = true;
  disableAllHintButtons();

  const isLastSentence = state.currentSentenceIndex >= state.lesson.sentences.length - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'inline-flex';
  nextBtn.textContent = isLastSentence ? '🏁 Xem kết quả' : 'Câu tiếp theo →';

  if (isCorrect) {
    toast(`✅ Chính xác! (${accuracy.toFixed(0)}%)`, 'success');
  } else {
    toast(`❌ Chưa đạt 80% (Hiện tại: ${accuracy.toFixed(0)}%)`, 'error');
  }
}

function normalizeWord(w) {
  return w.toLowerCase().replace(/[.,!?;:"()\[\]{}]/g, '').trim();
}

function nextSentence() {
  state.currentSentenceIndex++;
  if (state.currentSentenceIndex >= state.lesson.sentences.length) {
    showFinalResult();
  } else {
    loadCurrentSentence();
    document.getElementById('sentenceCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// =========================================================
// FINAL RESULT
// =========================================================
function showFinalResult() {
  document.getElementById('sentenceCard').style.display = 'none';

  const totalSentences = state.lesson.sentences.length;
  const correctCount = state.results.filter(r => r.isCorrect).length;
  const incorrectCount = totalSentences - correctCount;
  const accuracy = Math.round((correctCount / totalSentences) * 100);
  const score = Math.round((correctCount / totalSentences) * 10 * 10) / 10;
  const totalHints = state.results.reduce((sum, r) => sum + r.hintsUsed, 0);

  const transcriptHtml = state.lesson.sentences.map((s, i) => {
    const result = state.results[i];
    const lineClass = result.isCorrect ? 'correct-line' : 'incorrect-line';
    const icon = result.isCorrect ? '✅' : '❌';
    return `
      <div class="transcript-line ${lineClass}">
        <span class="line-number">${icon} ${i + 1}</span>
        <div>
          <div>${escapeHtml(s.text)}</div>
          ${!result.isCorrect ? `<div style="font-size:0.85rem; color:var(--text-muted); margin-top:4px;">
            Bạn gõ: <em>${escapeHtml(result.userAnswer)}</em> (${result.accuracy.toFixed(0)}%)
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  let scoreMessage = '', scoreEmoji = '';
  if (score === 10) { scoreMessage = 'Xuất sắc! Perfect score!'; scoreEmoji = '🏆'; }
  else if (score >= 8) { scoreMessage = 'Rất giỏi! Tiếp tục phát huy!'; scoreEmoji = '🌟'; }
  else if (score >= 6) { scoreMessage = 'Khá tốt! Cố gắng thêm nhé!'; scoreEmoji = '💪'; }
  else if (score >= 4) { scoreMessage = 'Cần cải thiện thêm!'; scoreEmoji = '📚'; }
  else { scoreMessage = 'Đừng nản, hãy thử lại nhé!'; scoreEmoji = '🌱'; }

  const resultContainer = document.getElementById('finalResult');
  resultContainer.style.display = 'block';
  resultContainer.innerHTML = `
    <div class="result-container">
      <div style="font-size: 4rem; margin-bottom: 16px;">${scoreEmoji}</div>
      <h2 style="margin-bottom: 8px;">${scoreMessage}</h2>
      <p style="color: var(--text-secondary); margin-bottom: 24px;">Bạn đã hoàn thành bài nghe "${escapeHtml(state.lesson.title)}"</p>
      <div class="result-score">
        <div class="result-score-value" id="animatedScore">0</div>
        <div class="result-score-label">Điểm trên 10</div>
      </div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-value" style="color: var(--success);">${correctCount}</div><div class="result-stat-label">Câu đúng ✅</div></div>
        <div class="result-stat"><div class="result-stat-value" style="color: var(--danger);">${incorrectCount}</div><div class="result-stat-label">Câu sai ❌</div></div>
        <div class="result-stat"><div class="result-stat-value">${totalSentences}</div><div class="result-stat-label">Tổng số câu</div></div>
        <div class="result-stat"><div class="result-stat-value">${accuracy}%</div><div class="result-stat-label">Độ chính xác</div></div>
        <div class="result-stat"><div class="result-stat-value" style="color: var(--warning);">${totalHints}</div><div class="result-stat-label">Hint đã dùng 💡</div></div>
      </div>
      <div class="full-transcript">
        <h3>📜 Full Transcript</h3>
        ${transcriptHtml}
      </div>
      <div class="action-row" style="justify-content: center; margin-top: 32px;">
        <button class="btn btn-primary" onclick="retryLesson()">🔁 Làm lại</button>
        <a href="index.html" class="btn btn-ghost">🏠 Về trang chủ</a>
      </div>
    </div>
  `;

  animateScore(score);
  resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function animateScore(target) {
  const el = document.getElementById('animatedScore');
  const duration = 1500;
  const startTime = performance.now();
  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = (target * eased).toFixed(1);
    if (progress < 1) requestAnimationFrame(update);
    else el.textContent = target.toFixed(1);
  }
  requestAnimationFrame(update);
}

function retryLesson() {
  state.currentSentenceIndex = 0;
  state.results = [];
  document.getElementById('finalResult').style.display = 'none';
  document.getElementById('sentenceCard').style.display = 'block';
  loadCurrentSentence();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =========================================================
// AUDIO & UTILS
// =========================================================
function setupInteractiveWaveform() {
  const container = document.getElementById('waveformContainer');
  const tooltip = document.getElementById('timeTooltip');
  const audio = state.audioEl;

  container.addEventListener('click', (e) => {
    if (!audio.duration || isNaN(audio.duration)) return;
    const rect = container.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.currentTime = ratio * audio.duration;
    if (audio.paused) {
      audio.play().catch(() => {});
      document.getElementById('playBtn').textContent = '⏸';
      state.isPlaying = true;
    }
  });

  container.addEventListener('mousemove', (e) => {
    if (!audio.duration || isNaN(audio.duration)) return;
    const rect = container.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    tooltip.textContent = formatTime(ratio * audio.duration);
    tooltip.style.left = `${e.clientX - rect.left}px`;
    tooltip.classList.add('visible');
  });

  container.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
}

function setupAudioEvents() {
  const audio = state.audioEl;
  audio.addEventListener('timeupdate', function() {
    document.getElementById('currentTime').textContent = formatTime(this.currentTime);
    document.getElementById('duration').textContent = formatTime(this.duration || 0);
    const bars = document.querySelectorAll('.wave-bar');
    const progress = this.duration ? this.currentTime / this.duration : 0;
    const activeCount = Math.floor(progress * bars.length);
    bars.forEach((bar, i) => bar.classList.toggle('active', i < activeCount));
  });
  audio.addEventListener('ended', () => {
    document.getElementById('playBtn').textContent = '▶';
    state.isPlaying = false;
  });
  audio.addEventListener('error', () => toast('⚠️ Lỗi tải audio', 'error'));
}

function togglePlay() {
  const audio = state.audioEl;
  const btn = document.getElementById('playBtn');
  if (audio.paused) {
    audio.play().then(() => { btn.textContent = '⏸'; state.isPlaying = true; })
      .catch(e => toast('Lỗi phát audio', 'error'));
  } else {
    audio.pause(); btn.textContent = '▶'; state.isPlaying = false;
  }
}

function seekAudio(seconds) {
  const audio = state.audioEl;
  if (audio.src && !isNaN(audio.duration)) {
    audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + seconds));
  }
}

function replayAudio() {
  const audio = state.audioEl;
  if (audio.src) { audio.currentTime = 0; audio.play().catch(() => {}); }
}

function setupSpeedButtons() {
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.audioEl.playbackRate = parseFloat(btn.dataset.speed);
    });
  });
}

function generateWaveform() {
  const waveform = document.getElementById('waveform');
  waveform.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = (20 + Math.random() * 80) + '%';
    waveform.appendChild(bar);
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = 'all 0.3s ease';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// Khởi chạy
initLesson();
</script>
</body>
</html>
