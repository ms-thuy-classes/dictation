<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luyện nghe - Learn with Ms.Thúy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="index.html" class="back-btn">← Quay lại</a>
      <div class="logo">
        <div class="logo-icon">🎧</div>
        <div class="logo-text">
          Learn with Ms.Thúy
          <small id="lessonTitle">Loading...</small>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="listening-container">

  <!-- Loading state -->
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div>Đang tải bài nghe...</div>
  </div>

  <!-- Lesson content (ẩn ban đầu) -->
  <div id="lessonContent" style="display:none;">

    <!-- Lesson Header with Progress -->
    <div class="lesson-header">
      <div class="lesson-title">
        <span id="lessonEmoji">🎧</span>
        <span id="lessonTitleMain">Lesson Title</span>
      </div>
      <div class="lesson-progress">
        <span id="progressText">Câu 1/5</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressPercent">0%</span>
      </div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player">
      <div class="player-main">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="player-info">
          <div class="waveform" id="waveform"></div>
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>
      <div class="player-controls">
        <div class="control-group">
          <button class="ctrl-btn" onclick="seekAudio(-5)">⏪ -5s</button>
          <button class="ctrl-btn" onclick="seekAudio(5)">+5s ⏩</button>
          <button class="ctrl-btn" onclick="replayAudio()">🔁 Replay</button>
        </div>
        <div class="control-group">
          <button class="ctrl-btn speed-btn" data-speed="0.5">0.5x</button>
          <button class="ctrl-btn speed-btn" data-speed="0.75">0.75x</button>
          <button class="ctrl-btn speed-btn active" data-speed="1">1x</button>
          <button class="ctrl-btn speed-btn" data-speed="1.25">1.25x</button>
          <button class="ctrl-btn speed-btn" data-speed="1.5">1.5x</button>
        </div>
      </div>
      <audio id="audioEl" preload="metadata"></audio>
    </div>

    <!-- Sentence Card -->
    <div class="sentence-card" id="sentenceCard">
      <div class="sentence-header">
        <div class="sentence-number">
          <span>📝</span>
          <span>Câu <span id="currentSentenceNum">1</span>/<span id="totalSentences">5</span></span>
        </div>
        <div class="sentence-translation" id="sentenceTranslation"></div>
      </div>

      <textarea
        class="dictation-input"
        id="dictInput"
        placeholder="Nghe và gõ những gì bạn nghe được..."
        oninput="autoResize(this)"></textarea>

      <!-- NEW HINT SYSTEM - Word by word -->
      <div class="hint-section" id="hintSection">
        <div class="hint-header">
          <span class="hint-title">💡 Hint</span>
          <span class="hint-counter" id="hintCounter">0/3</span>
        </div>
        <div class="hint-words-container" id="hintWordsContainer">
          <!-- Các từ sẽ được render động -->
        </div>
      </div>

      <!-- Sentence Result -->
      <div class="sentence-result" id="sentenceResult"></div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn btn-ghost" onclick="clearInput()">🗑️ Xóa</button>
        <button class="btn btn-primary" id="checkBtn" onclick="checkCurrentSentence()">✅ Kiểm tra</button>
        <button class="btn btn-success" id="nextBtn" onclick="nextSentence()" style="display:none;">
          Câu tiếp theo →
        </button>
      </div>
    </div>

    <!-- Final Result (ẩn ban đầu) -->
    <div id="finalResult" style="display:none;"></div>

  </div>
</main>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
<script>
/* =========================================================
   LISTENING PAGE LOGIC
   ========================================================= */

// State
const state = {
  lesson: null,
  currentSentenceIndex: 0,
  results: [],
  hintsUsedThisSentence: 0,
  revealedWords: [], // Mảng các index đã reveal
  isPlaying: false,
  audioEl: null
};

// =========================================================
// INIT - Load lesson data from URL params
// =========================================================
async function initLesson() {
  const params = new URLSearchParams(window.location.search);
  const lessonId = params.get('id');
  const dataFile = params.get('data');

  if (!dataFile) {
    toast('Thiếu thông tin bài học', 'error');
    return;
  }

  try {
    const res = await fetch(dataFile + '?t=' + Date.now());
    if (!res.ok) throw new Error('Không thể tải ' + dataFile);
    const lesson = await res.json();

    state.lesson = lesson;
    state.audioEl = document.getElementById('audioEl');

    // Update UI
    document.title = `${lesson.title} - Learn with Ms.Thúy`;
    document.getElementById('lessonTitle').textContent = lesson.title;
    document.getElementById('lessonTitleMain').textContent = lesson.title;
    document.getElementById('lessonEmoji').textContent = '🎧';
    document.getElementById('totalSentences').textContent = lesson.sentences.length;

    // Setup audio
    state.audioEl.src = lesson.audio;

    // Generate waveform
  function generateWaveform(){

    const waveform=document.getElementById("waveform");

    waveform.innerHTML="";

    const bars=60;

    for(let i=0;i<bars;i++){

        const bar=document.createElement("div");

        bar.className="wave-bar";

        bar.style.height=(20+Math.random()*80)+"%";

        bar.dataset.index=i;

        waveform.appendChild(bar);

    }

    waveform.onclick=seekByClick;

}
    function seekByClick(e){

    const waveform=document.getElementById("waveform");

    const rect=waveform.getBoundingClientRect();

    const x=e.clientX-rect.left;

    const percent=x/rect.width;

    const audio=state.audioEl;

    if(!audio.duration)return;

    audio.currentTime=percent*audio.duration;

    audio.play();

    document.getElementById("playBtn").textContent="⏸";

}

    // Load first sentence
    loadCurrentSentence();

    // Show content
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('lessonContent').style.display = 'block';

    // Setup audio events
    setupAudioEvents();

    // Setup speed buttons
    setupSpeedButtons();

  } catch (e) {
    console.error(e);
    document.getElementById('loadingState').innerHTML = `
      <div class="empty-state-icon">⚠️</div>
      <h3>Lỗi tải bài học</h3>
      <p style="margin-bottom: 16px;">${escapeHtml(e.message)}</p>
      <a href="index.html" class="btn btn-primary" style="margin-top: 16px;">← Về trang chủ</a>
    `;
  }
}

// =========================================================
// SENTENCE MANAGEMENT
// =========================================================
function loadCurrentSentence() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  if (!sentence) return;

  // Reset hint state
  state.hintsUsedThisSentence = 0;
  state.revealedWords = [];

  // Update UI
  document.getElementById('currentSentenceNum').textContent = state.currentSentenceIndex + 1;
  document.getElementById('sentenceTranslation').textContent = '💭 ' + (sentence.translation || '');

  // Reset input
  const input = document.getElementById('dictInput');
  input.value = '';
  input.disabled = false;
  input.focus();
  autoResize(input);

  // Hide result
  document.getElementById('sentenceResult').classList.remove('show', 'correct', 'incorrect');

  // Update buttons
  document.getElementById('checkBtn').style.display = 'inline-flex';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';

  // Render hint words
  renderHintWords();

  // Update progress
  updateProgress();
}

function updateProgress() {
  const total = state.lesson.sentences.length;
  const current = state.currentSentenceIndex;
  const percent = Math.round((current / total) * 100);

  document.getElementById('progressText').textContent = `Câu ${current + 1}/${total}`;
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressFill').style.width = percent + '%';
}

function updateHintCounter() {
  const maxHints = 3;
  document.getElementById('hintCounter').textContent = `${state.hintsUsedThisSentence}/${maxHints}`;
}

// =========================================================
// NEW HINT SYSTEM - Word by Word
// =========================================================
function renderHintWords() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  const words = sentence.text.split(/\s+/);
  const container = document.getElementById('hintWordsContainer');
  
  container.innerHTML = '';
  
  words.forEach((word, index) => {
    const wordItem = document.createElement('div');
    wordItem.className = 'hint-word-item';
    wordItem.dataset.index = index;
    
    // Word text (underline or revealed)
    const wordText = document.createElement('div');
    wordText.className = 'hint-word-text';
    wordText.id = `hint-word-${index}`;
    wordText.textContent = '_'.repeat(word.length);
    
    // Hint button
    const hintBtn = document.createElement('button');
    hintBtn.className = 'hint-word-btn';
    hintBtn.id = `hint-btn-${index}`;
    hintBtn.innerHTML = '👁️';
    hintBtn.onclick = () => revealWord(index);
    
    wordItem.appendChild(wordText);
    wordItem.appendChild(hintBtn);
    container.appendChild(wordItem);
  });
  
  updateHintCounter();
}

function revealWord(index) {
  const maxHints = 3;
  
  // Check if already revealed
  if (state.revealedWords.includes(index)) {
    return;
  }
  
  // Check if reached limit
  if (state.hintsUsedThisSentence >= maxHints) {
    toast('🚫 Bạn đã dùng hết 3 lượt Hint cho câu này.', 'warning');
    return;
  }
  
  // Reveal word
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  const words = sentence.text.split(/\s+/);
  const word = words[index];
  
  const wordTextEl = document.getElementById(`hint-word-${index}`);
  const hintBtnEl = document.getElementById(`hint-btn-${index}`);
  
  // Update text with animation
  wordTextEl.textContent = word;
  wordTextEl.classList.add('revealed');
  
  // Update button to checkmark
  hintBtnEl.innerHTML = '✓';
  hintBtnEl.classList.add('revealed');
  hintBtnEl.disabled = true;
  
  // Add to revealed list
  state.revealedWords.push(index);
  state.hintsUsedThisSentence++;
  
  updateHintCounter();
  
  // If reached limit, disable all remaining buttons
  if (state.hintsUsedThisSentence >= maxHints) {
    disableAllHintButtons();
  }
  
  toast(`💡 Đã mở từ "${word}"`, 'info');
}

function disableAllHintButtons() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  const words = sentence.text.split(/\s+/);
  
  words.forEach((word, index) => {
    if (!state.revealedWords.includes(index)) {
      const hintBtnEl = document.getElementById(`hint-btn-${index}`);
      hintBtnEl.innerHTML = '🔒';
      hintBtnEl.classList.add('locked');
      hintBtnEl.disabled = true;
    }
  });
}

// =========================================================
// CHECK SENTENCE
// =========================================================
function checkCurrentSentence() {
  const sentence = state.lesson.sentences[state.currentSentenceIndex];
  const userText = document.getElementById('dictInput').value.trim();

  if (!userText) {
    toast('Vui lòng gõ nội dung trước khi kiểm tra', 'warning');
    return;
  }

  // Compare
  const { isCorrect, html } = compareSentences(userText, sentence.text);

  // Save result
  state.results.push({
    sentenceId: sentence.id,
    userAnswer: userText,
    correctAnswer: sentence.text,
    isCorrect: isCorrect,
    hintsUsed: state.hintsUsedThisSentence
  });

  // Show result
  const resultEl = document.getElementById('sentenceResult');
  resultEl.className = 'sentence-result show ' + (isCorrect ? 'correct' : 'incorrect');
  resultEl.innerHTML = html;

  // Disable input & buttons
  document.getElementById('dictInput').disabled = true;
  document.getElementById('checkBtn').disabled = true;
  
  // Disable all hint buttons
  disableAllHintButtons();

  // Show next button
  const isLastSentence = state.currentSentenceIndex >= state.lesson.sentences.length - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = 'inline-flex';
  nextBtn.textContent = isLastSentence ? '🏁 Xem kết quả' : 'Câu tiếp theo →';

  // Toast
  if (isCorrect) {
    toast('✅ Chính xác! Giỏi lắm!', 'success');
  } else {
    toast('❌ Chưa đúng, xem đáp án bên dưới', 'error');
  }
}

function compareSentences(userText, correctText) {
  const userWords = userText.split(/\s+/).filter(w => w);
  const correctWords = correctText.split(/\s+/).filter(w => w);

  let html = '';
  let correctCount = 0;
  const maxLen = Math.max(userWords.length, correctWords.length);

  for (let i = 0; i < maxLen; i++) {
    const u = userWords[i];
    const c = correctWords[i];

    if (u === undefined) {
      html += `<span class="word-missing">[${escapeHtml(c)}]</span> `;
    } else if (c === undefined) {
      html += `<span class="word-wrong">${escapeHtml(u)}</span> `;
    } else if (normalizeWord(u) === normalizeWord(c)) {
      html += `<span class="word-correct">${escapeHtml(u)}</span> `;
      correctCount++;
    } else {
      html += `<span class="word-wrong">${escapeHtml(u)}</span> `;
    }
  }

  const isCorrect = correctCount === correctWords.length && userWords.length === correctWords.length;

  if (!isCorrect) {
    html += `<div class="correct-answer">✅ Đáp án đúng: <strong>${escapeHtml(correctText)}</strong></div>`;
  }

  return { isCorrect, html, correctCount, totalWords: correctWords.length };
}

function normalizeWord(w) {
  return w.toLowerCase().replace(/[.,!?;:"()\[\]{}]/g, '').trim();
}

// =========================================================
// NEXT SENTENCE
// =========================================================
function nextSentence() {
  state.currentSentenceIndex++;

  if (state.currentSentenceIndex >= state.lesson.sentences.length) {
    showFinalResult();
  } else {
    loadCurrentSentence();
    document.getElementById('sentenceCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// =========================================================
// FINAL RESULT
// =========================================================
function showFinalResult() {
  document.getElementById('sentenceCard').style.display = 'none';

  const totalSentences = state.lesson.sentences.length;
  const correctCount = state.results.filter(r => r.isCorrect).length;
  const incorrectCount = totalSentences - correctCount;
  const accuracy = Math.round((correctCount / totalSentences) * 100);
  const score = Math.round((correctCount / totalSentences) * 10 * 10) / 10;
  const totalHints = state.results.reduce((sum, r) => sum + r.hintsUsed, 0);

  const transcriptHtml = state.lesson.sentences.map((s, i) => {
    const result = state.results[i];
    const lineClass = result.isCorrect ? 'correct-line' : 'incorrect-line';
    const icon = result.isCorrect ? '✅' : '❌';
    return `
      <div class="transcript-line ${lineClass}">
        <span class="line-number">${icon} ${i + 1}</span>
        <div>
          <div>${escapeHtml(s.text)}</div>
          ${!result.isCorrect ? `<div style="font-size:0.85rem; color:var(--text-muted); margin-top:4px;">
            Bạn gõ: <em>${escapeHtml(result.userAnswer)}</em>
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  let scoreMessage = '';
  let scoreEmoji = '';
  if (score === 10) { scoreMessage = 'Xuất sắc! Perfect score!'; scoreEmoji = '🏆'; }
  else if (score >= 8) { scoreMessage = 'Rất giỏi! Tiếp tục phát huy!'; scoreEmoji = '🌟'; }
  else if (score >= 6) { scoreMessage = 'Khá tốt! Cố gắng thêm nhé!'; scoreEmoji = '💪'; }
  else if (score >= 4) { scoreMessage = 'Cần cải thiện thêm!'; scoreEmoji = '📚'; }
  else { scoreMessage = 'Đừng nản, hãy thử lại nhé!'; scoreEmoji = '🌱'; }

  const resultContainer = document.getElementById('finalResult');
  resultContainer.style.display = 'block';
  resultContainer.innerHTML = `
    <div class="result-container">
      <div style="font-size: 4rem; margin-bottom: 16px;">${scoreEmoji}</div>
      <h2 style="margin-bottom: 8px;">${scoreMessage}</h2>
      <p style="color: var(--text-secondary); margin-bottom: 24px;">Bạn đã hoàn thành bài nghe "${escapeHtml(state.lesson.title)}"</p>

      <div class="result-score">
        <div class="result-score-value" id="animatedScore">0</div>
        <div class="result-score-label">Điểm trên 10</div>
      </div>

      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value" style="color: var(--success);">${correctCount}</div>
          <div class="result-stat-label">Câu đúng ✅</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value" style="color: var(--danger);">${incorrectCount}</div>
          <div class="result-stat-label">Câu sai ❌</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${totalSentences}</div>
          <div class="result-stat-label">Tổng số câu</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${accuracy}%</div>
          <div class="result-stat-label">Độ chính xác</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value" style="color: var(--warning);">${totalHints}</div>
          <div class="result-stat-label">Hint đã dùng 💡</div>
        </div>
      </div>

      <div class="full-transcript">
        <h3>📜 Full Transcript</h3>
        ${transcriptHtml}
      </div>

      <div class="action-row" style="justify-content: center; margin-top: 32px;">
        <button class="btn btn-primary" onclick="retryLesson()">🔁 Làm lại</button>
        <a href="index.html" class="btn btn-ghost">🏠 Về trang chủ</a>
      </div>
    </div>
  `;

  animateScore(score);
  resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function animateScore(target) {
  const el = document.getElementById('animatedScore');
  let current = 0;
  const duration = 1500;
  const startTime = performance.now();

  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    current = target * eased;
    el.textContent = current.toFixed(1);
    if (progress < 1) requestAnimationFrame(update);
    else el.textContent = target.toFixed(1);
  }
  requestAnimationFrame(update);
}

function retryLesson() {
  state.currentSentenceIndex = 0;
  state.results = [];
  document.getElementById('finalResult').style.display = 'none';
  document.getElementById('sentenceCard').style.display = 'block';
  loadCurrentSentence();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =========================================================
// AUDIO PLAYER
// =========================================================
function setupAudioEvents() {
  const audio = state.audioEl;

  audio.addEventListener('timeupdate', function() {
    const current = this.currentTime;
    const duration = this.duration || 0;
    document.getElementById('currentTime').textContent = formatTime(current);
    document.getElementById('duration').textContent = formatTime(duration);

    const bars = document.querySelectorAll('.wave-bar');
    const progress = duration ? current / duration : 0;
    const activeCount = Math.floor(progress * bars.length);
   bars.forEach((bar,i)=>{

bar.classList.toggle(
"active",
i<=activeCount
);

});

  audio.addEventListener('ended', function() {
    document.getElementById('playBtn').textContent = '▶';
    state.isPlaying = false;
  });

  audio.addEventListener('error', function() {
    toast('⚠️ Không thể tải file audio. Kiểm tra thư mục audio/', 'error');
  });
}

function togglePlay() {
  const audio = state.audioEl;
  const btn = document.getElementById('playBtn');

  if (audio.paused) {
    audio.play().then(() => {
      btn.textContent = '⏸';
      state.isPlaying = true;
    }).catch(e => {
      toast('Lỗi phát audio: ' + e.message, 'error');
    });
  } else {
    audio.pause();
    btn.textContent = '▶';
    state.isPlaying = false;
  }
}

function seekAudio(seconds) {
  const audio = state.audioEl;
  if (audio.src) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + seconds));
  }
}

function replayAudio() {
  const audio = state.audioEl;
  if (audio.src) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }
}

function setupSpeedButtons() {
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.audioEl.playbackRate = parseFloat(btn.dataset.speed);
    });
  });
}

function generateWaveform() {
  const waveform = document.getElementById('waveform');
  waveform.innerHTML = '';
  const bars = 60;
  for (let i = 0; i < bars; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = (20 + Math.random() * 80) + '%';
    waveform.appendChild(bar);
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// =========================================================
// UTILITIES
// =========================================================
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function clearInput() {
  const input = document.getElementById('dictInput');
  input.value = '';
  autoResize(input);
  input.focus();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  if (!container) return;

  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);

  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(100%)';
    el.style.transition = 'all 0.3s ease';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// =========================================================
// INIT
// =========================================================
initLesson();
</script>

</body>
</html>
